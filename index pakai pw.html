<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre dan Post Test People Factory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
  .header p  { font-size: 13px; color: #718096; }
  .page { display: none; }
  .page.active { display: block; }
  .category-grid { display: flex; flex-direction: column; gap: 14px; max-width: 420px; margin: 0 auto; }
  .cat-card {
    background: #fff; border-radius: 16px; padding: 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; border: 1.5px solid #e2e8f0;
    transition: transform 0.15s; text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-card:active { transform: scale(0.97); }
  .cat-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .cat-icon.op  { background: #ebf5fb; }
  .cat-icon.she { background: #eafaf1; }
  .cat-icon.hr  { background: #fef9e7; }
  .cat-info h2 { font-size: 16px; font-weight: 700; color: #1a202c; margin-bottom: 2px; }
  .cat-arrow   { margin-left: auto; color: #a0aec0; font-size: 20px; }
  .form-list { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .form-item {
    background: #fff; border-radius: 14px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; border: 1.5px solid #e2e8f0;
    text-decoration: none; transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .form-item:active { transform: scale(0.97); }
  .form-num { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .num-op  { background: #ebf5fb; color: #1a56db; }
  .num-she { background: #eafaf1; color: #1e8449; }
  .num-hr  { background: #fef9e7; color: #b7770d; }
  .form-name  { font-size: 14px; font-weight: 500; color: #2d3748; line-height: 1.4; flex: 1; }
  .form-arrow { color: #a0aec0; font-size: 18px; flex-shrink: 0; }
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none; color: #1a56db;
    font-size: 15px; font-weight: 600; cursor: pointer;
    padding: 0; margin: 0 auto 20px; max-width: 420px; width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; margin: 0 auto 20px; width: fit-content; }
  .badge-op  { background: #ebf5fb; color: #1a56db; }
  .badge-she { background: #eafaf1; color: #1e8449; }
  .badge-hr  { background: #fef9e7; color: #b7770d; }
  .badge-wrap { display: flex; justify-content: center; }

  /* ===== PASSWORD MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 999;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #fff; border-radius: 20px; padding: 28px 24px;
    width: 100%; max-width: 360px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-icon  { font-size: 36px; margin-bottom: 12px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
  .modal-sub   { font-size: 13px; color: #718096; margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1.5px solid #e2e8f0; font-size: 15px;
    outline: none; margin-bottom: 12px;
    transition: border-color 0.2s;
    text-align: center; letter-spacing: 2px;
  }
  .modal-input:focus { border-color: #1a56db; }
  .modal-input.error { border-color: #e53e3e; }
  .modal-error { font-size: 12px; color: #e53e3e; margin-bottom: 12px; min-height: 18px; }
  .modal-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    border: none; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-bottom: 10px;
    transition: opacity 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn-primary { background: #1a56db; color: #fff; }
  .modal-btn-cancel  { background: #f7fafc; color: #718096; }
</style>
</head>

      { nama: "Mengaplikasikan Perencanaan Jangka Pendek SDM untuk Menentukan Alokasi Detil SDM Sesuai Jenis Peralatan Tambang", url: "https://docs.google.com/forms/d/e/1FAIpQLScaAbpXgmiVSt92IllBQ6KbcsfMs3U00NMjYYTDCqPCdkVEWA/viewform?usp=header" }
    ]
  };

  const META = {
    operation: { label: "&#9881; Operation", numClass: "num-op",  badgeClass: "badge-op"  },
    she:       { label: "&#128737; SHE",     numClass: "num-she", badgeClass: "badge-she" },
    hr:        { label: "&#128100; HR",      numClass: "num-hr",  badgeClass: "badge-hr"  }
  };

  function showForms(cat) {
    const forms = DATA[cat];
    const meta  = META[cat];
    const list  = document.getElementById('form-list');
    const badge = document.getElementById('cat-badge');
    badge.innerHTML = meta.label;
    badge.className = 'cat-badge ' + meta.badgeClass;
    list.innerHTML  = '';
    forms.forEach(function(f, i) {
      const a = document.createElement('a');
      a.className = 'form-item';
      a.href      = f.url;
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.innerHTML =
        '<div class="form-num ' + meta.numClass + '">' + (i + 1) + '</div>' +
        '<span class="form-name">' + f.nama + '</span>' +
        '<span class="form-arrow">&#8250;</span>';
      list.appendChild(a);
    });
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-forms').classList.add('active');
    window.scrollTo(0, 0);
  }

  function showHome() {
    document.getElementById('page-forms').classList.remove('active');
    document.getElementById('page-home').classList.add('active');
    window.scrollTo(0, 0);
  }
</script>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">🔒</div>
    <div class="modal-title" id="modal-title">Masukkan Password</div>
    <div class="modal-sub" id="modal-sub">Password diperlukan untuk mengakses kategori ini</div>
    <input class="modal-input" type="password" id="modal-input" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') checkPassword()">
    <div class="modal-error" id="modal-error"></div>
    <button class="modal-btn modal-btn-primary" onclick="checkPassword()">Masuk</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Batal</button>
  </div>
</div>
